<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sozlamalar | Eco Sports</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" href="../../style.css">
    <!-- Local CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Navbar container, filled via JS -->
        <div id="navbar-container"></div>

        <section class="subheader">
            <div class="subheader-left">
                <h1 id="view-title">Tizim Sozlamalari</h1>
            </div>
        </section>

        <main class="content-container">
            <div class="tab-pane active" id="tab-settings">
                <div class="settings-container">
                    
                    <div class="card-glass" style="max-width: 600px; margin: 0 auto; margin-top: 30px; text-align: center; padding: 40px 20px;">
                        <i class="fa-solid fa-gear" style="font-size: 3rem; color: var(--color-text-muted); margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto;"></i>
                        <h3>Tizim Sozlamalari</h3>
                        <p style="color: var(--color-text-muted); margin-top: 10px;">Hozircha tizimda o'zgartiriladigan sozlamalar mavjud emas.</p>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Navbar Script -->
    <script src="../../shared/navbar.js"></script>
    <script>
        try { renderNavbar('settings'); } catch(e) { console.error('Navbar xato:', e); }
    </script>
