<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sozlamalar | Eco Sports</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" href="../../style.css">
    <!-- Local CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Navbar yerni to'ldirib turadi, JS orqali chiziladi -->
        <div id="navbar-container"></div>

        <section class="subheader">
            <div class="subheader-left">
                <h1 id="view-title">Tizim Sozlamalari</h1>
            </div>
        </section>

        <main class="content-container">
            <div class="tab-pane active" id="tab-settings">
                <div class="settings-container">
                    
                    <div class="card-glass" style="max-width: 600px; margin: 0 auto; margin-top: 30px;">
                        <div class="card-glass-header">
                            <h3><i class="fa-solid fa-robot text-prospect"></i> Sun'iy Idrok (AI) Sozlamalari</h3>
                        </div>
                        
                        <div style="padding: 20px;">
                            <p style="color: var(--color-text-muted); font-size: 0.9rem; margin-bottom: 20px;">
                                Tizimdagi "Agent Chevar" to'g'ri ishlashi uchun Google Gemini API kalitini kiritishingiz va kerakli modelni tanlashingiz lozim.
                            </p>

                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="font-weight: 500; margin-bottom: 8px; display: block;">Gemini API Kaliti</label>
                                <input type="password" id="setting-api-key" placeholder="AIzaSy..." class="form-control" style="width: 100%; background: rgba(0,0,0,0.3);">
                            </div>

                            <div class="form-group" style="margin-bottom: 25px;">
                                <label style="font-weight: 500; margin-bottom: 8px; display: block;">AI Modeli</label>
                                <select id="setting-ai-model" class="form-control" style="width: 100%; background: rgba(0,0,0,0.3); appearance: auto;">
                                    <option value="gemini-2.5-flash">Gemini 2.5 Flash (Tavsiya etiladi - Tezkor va arzon)</option>
                                    <option value="gemini-2.5-pro">Gemini 2.5 Pro (Aqlli va keng qamrovli)</option>
                                    <option value="gemini-1.5-flash">Gemini 1.5 Flash (Eski model)</option>
                                    <option value="gemini-1.5-pro">Gemini 1.5 Pro (Eski model)</option>
                                </select>
                            </div>

                            <button id="btn-save-settings" onclick="if(typeof saveSettings==='function') saveSettings();" class="btn btn-primary" style="width: 100%; padding: 12px; background: var(--color-prospect); border: none; font-size: 1rem; cursor: pointer;">
                                <i class="fa-solid fa-floppy-disk"></i> Sozlamalarni Saqlash
                            </button>

                            <div id="settings-status" style="margin-top: 15px; text-align: center; font-size: 0.9rem; font-weight: 500; display: none;"></div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Navbar Script (alohida) -->
    <script src="../../shared/navbar.js"></script>
    <script>
        try { renderNavbar('settings'); } catch(e) { console.error('Navbar xato:', e); }
    </script>

    <!-- Sozlamalar Saqlash Script (alohida, mustaqil) -->
    <script>
        var apiKeyInput = document.getElementById('setting-api-key');
        var aiModelSelect = document.getElementById('setting-ai-model');
        var statusDiv = document.getElementById('settings-status');

        // Saqlangan ma'lumotlarni yuklash
        try {
            var m = localStorage.getItem('gemini_ai_model');
            if (m === 'gemini-1.5-flash' || m === 'gemini-pro' || !m) {
                localStorage.setItem('gemini_ai_model', 'gemini-2.5-flash');
            } else if (m === 'gemini-1.5-pro') {
                localStorage.setItem('gemini_ai_model', 'gemini-2.5-pro');
            }

            var savedKey = localStorage.getItem('gemini_api_key');
            var savedModel = localStorage.getItem('gemini_ai_model');
            if (savedKey && apiKeyInput) apiKeyInput.value = savedKey;
            if (savedModel && aiModelSelect) aiModelSelect.value = savedModel;
        } catch(e) {}

        function saveSettings() {
            var key = apiKeyInput ? apiKeyInput.value.trim() : '';
            var model = aiModelSelect ? aiModelSelect.value : 'gemini-2.5-flash';

            if (!key) {
                statusDiv.style.cssText = 'display:block; color:#ff4d4f; margin-top:15px; text-align:center; font-size:0.9rem; font-weight:500;';
                statusDiv.innerText = 'Iltimos, API kalitini kiriting!';
                return;
            }

            localStorage.setItem('gemini_api_key', key);
            localStorage.setItem('gemini_ai_model', model);

            statusDiv.style.cssText = 'display:block; color:#52c41a; margin-top:15px; text-align:center; font-size:0.9rem; font-weight:500;';
            statusDiv.innerText = 'Sozlamalar muvaffaqiyatli saqlandi!';
            setTimeout(function() { statusDiv.style.display = 'none'; }, 4000);
        }

        var saveBtn = document.getElementById('btn-save-settings');
        if (saveBtn) {
            saveBtn.onclick = saveSettings;
        }
    </script>
</body>
</html>
